name: Shared CI and Dev Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker/ci/**'
      - '.github/workflows/shared-tauri-ci-images.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: ghcr.io/liminal-hq

jobs:
  cadence:
    name: Evaluate publish cadence
    runs-on: ubuntu-latest
    # No checkout and no GHCR access in this job, so it needs nothing beyond
    # the default GITHUB_TOKEN metadata access.
    permissions: {}
    outputs:
      run_publish: ${{ steps.cadence.outputs.run_publish }}
    steps:
      - name: Decide whether this run should publish
        id: cadence
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          week_number="$(date +%V)"
          if ((10#$week_number % 2 == 0)); then
            echo "run_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Scheduled skip notice
        if: github.event_name == 'schedule' && steps.cadence.outputs.run_publish != 'true'
        run: |
          echo "## Shared image publish skipped" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "Skipping this scheduled run to keep a two-week publish cadence." >> "${GITHUB_STEP_SUMMARY}"

  # Single-platform images build, smoke-check, and push in one matrixed job.
  publish-images:
    name: Publish ${{ matrix.label }}
    runs-on: ubuntu-latest
    needs: cadence
    if: needs.cadence.outputs.run_publish == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: CI mobile image
            image: tauri-ci-mobile
            target: ci-mobile
            platforms: linux/amd64
            smoke_platform: linux/amd64
            smoke_profile: ci-mobile
          - label: Dev Rust image
            image: dev-rust
            target: dev-rust
            platforms: linux/amd64
            smoke_platform: linux/amd64
            smoke_profile: dev-rust
          - label: Dev web image
            image: dev-web
            target: dev-web
            platforms: linux/amd64
            smoke_platform: linux/amd64
            smoke_profile: dev-web
          - label: Dev desktop image
            image: tauri-dev-desktop
            target: dev-desktop
            platforms: linux/amd64
            smoke_platform: linux/amd64
            smoke_profile: dev-desktop
          - label: Dev mobile image
            image: tauri-dev-mobile
            target: dev-mobile
            platforms: linux/amd64
            smoke_platform: linux/amd64
            smoke_profile: dev-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref != 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build smoke image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: docker/ci/Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.smoke_platform }}
          load: true
          tags: local-smoke:${{ matrix.target }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max

      - name: Run smoke checks
        run: bash docker/ci/smoke-check.sh "${{ matrix.smoke_profile }}" "local-smoke:${{ matrix.target }}"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: docker/ci/Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max

      - name: Write publish summary
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "## ${{ matrix.label }} published" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Image: \`${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Docker target: \`${{ matrix.target }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Platforms: \`${{ matrix.platforms }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Digest: \`${DIGEST}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Tags" >> "${GITHUB_STEP_SUMMARY}"
          echo "${TAGS}" | sed 's/^/- `/; s/$/`/' >> "${GITHUB_STEP_SUMMARY}"

  # Multi-platform images (linux/amd64,linux/arm64): building both platforms in one
  # buildx invocation on an amd64 runner emulates arm64 via QEMU, which takes 2+ hours
  # for this Dockerfile's from-source cargo installs. Building each platform natively
  # (arm64 on GitHub's native arm64 runner, public-repo GA) and merging the resulting
  # digests into one manifest avoids emulation entirely.
  build-multiarch:
    name: Build ${{ matrix.label }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: cadence
    if: needs.cadence.outputs.run_publish == 'true'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: CI Rust image
            image: ci-rust
            target: ci-rust
            smoke_profile: ci-rust
            platform: linux/amd64
            runner: ubuntu-24.04
          - label: CI Rust image
            image: ci-rust
            target: ci-rust
            smoke_profile: ci-rust
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - label: CI web image
            image: ci-web
            target: ci-web
            smoke_profile: ci-web
            platform: linux/amd64
            runner: ubuntu-24.04
          - label: CI web image
            image: ci-web
            target: ci-web
            smoke_profile: ci-web
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - label: CI desktop image
            image: tauri-ci-desktop
            target: ci-desktop
            smoke_profile: ci-desktop
            platform: linux/amd64
            runner: ubuntu-24.04
          - label: CI desktop image
            image: tauri-ci-desktop
            target: ci-desktop
            smoke_profile: ci-desktop
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Sanitize platform for artifact/tag naming
        id: platform_pair
        run: echo "pair=$(echo '${{ matrix.platform }}' | tr / -)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build smoke image
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: docker/ci/Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          load: true
          tags: local-smoke:${{ matrix.target }}-${{ steps.platform_pair.outputs.pair }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max

      - name: Run smoke checks
        env:
          PLATFORM_PAIR: ${{ steps.platform_pair.outputs.pair }}
        run: bash docker/ci/smoke-check.sh "${{ matrix.smoke_profile }}" "local-smoke:${{ matrix.target }}-${PLATFORM_PAIR}"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6.19.2
        with:
          context: .
          file: docker/ci/Dockerfile
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:buildcache,mode=max

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4.6.2
        with:
          name: digests-${{ matrix.target }}-${{ steps.platform_pair.outputs.pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-multiarch:
    name: Publish ${{ matrix.label }} (merged manifest)
    runs-on: ubuntu-24.04
    needs: build-multiarch
    # No checkout in this job (only artifact download + buildx/GHCR), so
    # `contents: read` is deliberately omitted here. If a future step needs
    # repo content, add it back explicitly.
    permissions:
      actions: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: CI Rust image
            image: ci-rust
            target: ci-rust
          - label: CI web image
            image: ci-web
            target: ci-web
          - label: CI desktop image
            image: tauri-ci-desktop
            target: ci-desktop
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4.3.0
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.target }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5.10.0
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref != 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          IMAGE_REF: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE_REF}@sha256:%s " *)

      - name: Inspect image
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          IMAGE_REF: ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
        run: docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}"

      - name: Write publish summary
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "## ${{ matrix.label }} published" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Image: \`${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Platforms: \`linux/amd64,linux/arm64\` (built natively per-arch, merged)" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Tags" >> "${GITHUB_STEP_SUMMARY}"
          echo "${TAGS}" | sed 's/^/- `/; s/$/`/' >> "${GITHUB_STEP_SUMMARY}"
