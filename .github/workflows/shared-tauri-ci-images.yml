name: Shared Tauri CI Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker/ci/**'
      - '.github/workflows/shared-tauri-ci-images.yml'
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAMESPACE: ghcr.io/liminal-hq
  DESKTOP_IMAGE: tauri-ci-desktop
  MOBILE_IMAGE: tauri-ci-mobile

jobs:
  publish-desktop:
    name: Publish desktop image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Decide whether scheduled run should publish
        id: cadence
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          week_number="$(date +%V)"
          if ((10#$week_number % 2 == 0)); then
            echo "run_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.cadence.outputs.run_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.cadence.outputs.run_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract desktop metadata
        if: steps.cadence.outputs.run_publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ env.DESKTOP_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push desktop image
        if: steps.cadence.outputs.run_publish == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci/Dockerfile
          target: desktop
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write desktop summary
        if: steps.cadence.outputs.run_publish == 'true'
        run: |
          echo "## Desktop image published" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Image: \`${{ env.IMAGE_NAMESPACE }}/${{ env.DESKTOP_IMAGE }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Tags" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/; s/$/`/' >> "${GITHUB_STEP_SUMMARY}"

      - name: Scheduled skip notice
        if: github.event_name == 'schedule' && steps.cadence.outputs.run_publish != 'true'
        run: echo "Skipping this scheduled run to keep a two-week publish cadence."

  publish-mobile:
    name: Publish mobile image
    runs-on: ubuntu-latest
    needs: publish-desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Decide whether scheduled run should publish
        id: cadence
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "run_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          week_number="$(date +%V)"
          if ((10#$week_number % 2 == 0)); then
            echo "run_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.cadence.outputs.run_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.cadence.outputs.run_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract mobile metadata
        if: steps.cadence.outputs.run_publish == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/${{ env.MOBILE_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
            type=schedule,pattern={{date 'YYYYMMDD'}}

      - name: Build and push mobile image
        if: steps.cadence.outputs.run_publish == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ci/Dockerfile
          target: mobile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write mobile summary
        if: steps.cadence.outputs.run_publish == 'true'
        run: |
          echo "## Mobile image published" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Image: \`${{ env.IMAGE_NAMESPACE }}/${{ env.MOBILE_IMAGE }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Platforms: \`linux/amd64\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "### Tags" >> "${GITHUB_STEP_SUMMARY}"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/; s/$/`/' >> "${GITHUB_STEP_SUMMARY}"

      - name: Scheduled skip notice
        if: github.event_name == 'schedule' && steps.cadence.outputs.run_publish != 'true'
        run: echo "Skipping this scheduled run to keep a two-week publish cadence."
