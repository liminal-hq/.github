name: CI Quality Checks

on:
  pull_request:

permissions: {}

jobs:
  actionlint:
    name: Lint workflow YAML (actionlint + shellcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1.72.0
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          # actionlint reports every diagnostic (including shellcheck-sourced
          # ones) at a uniform "error" level to reviewdog regardless of
          # shellcheck's own embedded style/info/warning severity, so
          # fail_level alone can't distinguish them. Ignore the specific,
          # already-triaged shellcheck codes in the existing scripts
          # (SC2129 style, SC2016/SC2012 info, SC2046 warning) by message
          # instead, so new codes still fail the check. No quotes: this
          # action's entrypoint is a POSIX sh script that word-splits this
          # value without stripping quotes, so a quoted value would be
          # passed to actionlint literally (quote characters included) and
          # silently match nothing.
          actionlint_flags: -ignore SC2129 -ignore SC2016 -ignore SC2012 -ignore SC2046

  hadolint:
    name: Lint Dockerfile (hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/ci/Dockerfile
          config: .hadolint.yaml

  markdownlint:
    name: Lint Markdown docs (markdownlint-cli2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v24.0.0
        with:
          globs: '**/*.md'
          config: .markdownlint.jsonc
