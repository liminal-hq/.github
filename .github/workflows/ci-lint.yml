name: CI Quality Checks

on:
  pull_request:

permissions: {}

jobs:
  actionlint:
    name: Lint workflow YAML (actionlint + shellcheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1.72.0
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error

  hadolint:
    name: Lint Dockerfile (hadolint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/ci/Dockerfile
          config: .hadolint.yaml

  markdownlint:
    name: Lint Markdown docs (markdownlint-cli2)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v24.0.0
        with:
          globs: '**/*.md'
          config: .markdownlint.jsonc
