name: Security Audit (zizmor)

on:
  pull_request:
  push:
    branches:
      - main

permissions: {}

jobs:
  zizmor:
    name: Audit workflows with zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      # Non-blocking for now: the existing workflows carry an untriaged
      # backlog of findings (unpinned actions, template-injection-shaped
      # `run:` steps, one overly broad `permissions:` block). Findings still
      # upload to the repo's Security tab for visibility; flip
      # continue-on-error off once that backlog has been worked through.
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@v0.5.7
        continue-on-error: true
